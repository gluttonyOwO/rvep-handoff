# Dev-only compose. Adjusted for GCP Public RTC Routing Deployment.
# Required env vars (put in apps/backend/.env, which must be gitignored):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   LIVEKIT_API_KEY, LIVEKIT_API_SECRET
name: rvep-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: rvep-postgres
    restart: unless-stopped
    ports:
      # Loopback-only: prevents the entire LAN / public internet from reaching
      # the DB with the configured credentials. Critical hardening: a publicly
      # exposed Postgres superuser can RCE via `COPY ... FROM PROGRAM`.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rvep
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging: *default-logging
    networks: [backend]

  livekit:
      image: livekit/livekit-server:v1.7.2
      container_name: rvep-livekit
      restart: unless-stopped
      
      # 🌟 核心修正 1：改用主機網路模式，繞過 Docker Proxy，10000 個埠口直接秒開！
      network_mode: host
      
      environment:
        LIVEKIT_KEYS: "devkey: devsecret"
        LIVEKIT_PORT: 7880
        LIVEKIT_BIND_ADDRESSES: "0.0.0.0"
        
        # 🌟 核心修正 2：指定 WebRTC 媒體流使用 GCP 的 50000-60000 埠段
        LIVEKIT_RTC_PORT_RANGE_START: 50000
        LIVEKIT_RTC_PORT_RANGE_END: 60000
        
        # 🌟 核心修正 3：對外宣告你的 GCP 真實公網 IP
        LIVEKIT_RTC_NODE_IP: "35.206.240.29"
        LIVEKIT_LOG_LEVEL: info
      healthcheck:
        test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
        interval: 10s
        timeout: 5s
        retries: 5
      <<: *default-security
      deploy:
        resources:
          limits:
            cpus: "2"
            memory: 1G
      logging: *default-logging
      # 🌟 注意：使用 host 模式時，不能與普通的 networks 混用，請刪除或註解掉這行：
      # networks: [backend]

volumes:
  pgdata:

networks:
  backend:
    driver: bridge